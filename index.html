<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운영협업포털</title>
<style>
  :root {
    --primary: #2563eb; --primary-dark: #1d4ed8;
    --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
    --text: #1e293b; --muted: #64748b;
    --success: #16a34a; --warning: #d97706; --danger: #dc2626;
    --sidebar-w: 204px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 13px; }

  /* 사이드바 */
  #sidebar { width: var(--sidebar-w); background: #1e293b; color: #f8fafc; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
  .logo { padding: 18px 16px; font-size: 14px; font-weight: 700; border-bottom: 1px solid #334155; line-height: 1.4; }
  .logo span { display: block; font-size: 11px; font-weight: 400; color: #94a3b8; margin-top: 2px; }
  #sidebar nav { flex: 1; padding: 6px 0; }
  #sidebar nav a { display: flex; align-items: center; gap: 9px; padding: 9px 16px; color: #cbd5e1; text-decoration: none; font-size: 13px; cursor: pointer; transition: background .15s; user-select: none; }
  #sidebar nav a:hover { background: #334155; color: #f1f5f9; }
  #sidebar nav a.active { background: var(--primary); color: #fff; }
  .nav-icon { font-size: 15px; width: 18px; text-align: center; }
  .sidebar-footer { padding: 10px 16px; font-size: 11px; color: #475569; border-top: 1px solid #334155; }

  /* 메인 */
  #main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  #topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 20px; height: 50px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .page-title { font-size: 14px; font-weight: 700; }
  #content { padding: 20px; flex: 1; }

  /* 카드 */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin-bottom: 16px; }
  .card-title { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .06em; }

  /* 버튼 */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: background .15s; font-family: inherit; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--bg); }
  .btn-ghost { background: transparent; border: none; color: var(--muted); padding: 4px 8px; }
  .btn-ghost:hover { color: var(--text); background: var(--bg); }

  /* 배지 */
  .badge { display: inline-block; padding: 2px 7px; border-radius: 99px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-blue   { background: #dbeafe; color: #1d4ed8; }
  .badge-green  { background: #dcfce7; color: #15803d; }
  .badge-red    { background: #fee2e2; color: #b91c1c; }
  .badge-yellow { background: #fef9c3; color: #a16207; }
  .badge-orange { background: #ffedd5; color: #c2410c; }
  .badge-gray   { background: #f1f5f9; color: #475569; }
  .badge-purple { background: #ede9fe; color: #6d28d9; }

  /* 테이블 */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f8fafc; text-align: left; padding: 8px 10px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 700; white-space: nowrap; }
  td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  .empty-row td { text-align: center; color: var(--muted); padding: 32px; }

  /* 그리드 */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }

  /* 통계 카드 */
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .stat-value { font-size: 26px; font-weight: 800; line-height: 1; }
  .stat-sub   { font-size: 11px; color: var(--muted); margin-top: 5px; }
  .stat-link  { font-size: 11px; color: var(--primary); cursor: pointer; margin-top: 6px; display: inline-block; }

  /* 필터바 */
  .filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .filter-bar input, .filter-bar select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-family: inherit; background: #fff; color: var(--text); }
  .filter-bar input:focus, .filter-bar select:focus { outline: none; border-color: var(--primary); }
  .filter-bar input { min-width: 200px; }
  .filter-count { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* 폼 */
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
  .form-group label .req { color: var(--danger); }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; background: #fff; color: var(--text); }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px #dbeafe; }
  .form-group input.auto-id { background: #f8fafc; color: var(--muted); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-hint { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .warn-field { border-color: var(--warning) !important; background: #fffbeb !important; }

  /* 모달 */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 10px; width: 540px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { font-size: 14px; font-weight: 700; }
  .modal-body { padding: 18px; }
  .modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .close-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); line-height: 1; }

  /* 링크 카드 */
  .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 10px; }
  .link-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; text-decoration: none; color: var(--text); transition: box-shadow .15s; }
  .link-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.09); border-color: var(--primary); }
  .link-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .link-name { font-size: 13px; font-weight: 600; }
  .link-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .link-url  { font-size: 10px; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }

  /* 토스트 */
  #toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: #fff; padding: 9px 16px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; transform: translateY(6px); }
  #toast.show { opacity: 1; pointer-events: auto; transform: translateY(0); }

  /* 로딩 */
  .loading { text-align: center; padding: 40px; color: var(--muted); }

  /* 주의사항 아이콘 */
  .alert-icon { font-size: 13px; }
</style>
</head>
<body>

<!-- 사이드바 -->
<div id="sidebar">
  <div class="logo">운영협업포털<span>Ops Collab Portal</span></div>
  <nav>
    <a id="nav-home"      onclick="showPage('home')">      <span class="nav-icon">🏠</span> 홈</a>

<script>
// ══ 설정 ════════════════════════════════════════════
window.PORTAL_CONFIG = {
  SPREADSHEET_ID: '12ZpwaDPNCV1V48xUtuWv2cooGtAjBZLIbClu3R88HoU',
  GITHUB_OWNER:   'nvidiabigfan',
  GITHUB_REPO:    'ops-collab-portal',
  GITHUB_TOKEN:   localStorage.getItem('portal_gh_token') || '',
};

// ══ 상태 ════════════════════════════════════════════
const S = { schedules:[], pages:[], defects:[], links:[], migrations:[] };

// ══ 유틸 ════════════════════════════════════════════
let _toastTimer;
function toast(msg, ms=2800) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function pad4(n) { return String(n).padStart(4,'0'); }
function today() { return new Date().toISOString().slice(0,10); }

function severityBadge(s) {
  const m = {'긴급':'badge-red','높음':'badge-orange','중간':'badge-yellow','낮음':'badge-blue',
             '미처리':'badge-red','처리중':'badge-yellow','해결':'badge-green','보류':'badge-gray',
             '예정':'badge-blue','진행중':'badge-yellow','완료':'badge-green','취소':'badge-gray'};
  return `<span class="badge ${m[s]||'badge-gray'}">${s||''}</span>`;
}

// CSV 내보내기
function exportCSV(data, filename) {
  if (!data.length) { toast('내보낼 데이터가 없습니다'); return; }
  const keys = Object.keys(data[0]);
  const rows = [keys.join(','), ...data.map(r => keys.map(k => `"${(r[k]||'').replace(/"/g,'""')}"`).join(','))];
  const blob = new Blob(['\uFEFF'+rows.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}

// ══ 내비게이션 ════════════════════════════════════════
function showPage(page) {
  document.querySelectorAll('#sidebar nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('nav-'+page).classList.add('active');
  const titles = {home:'홈',schedule:'일정관리',impact:'영향도관리',defect:'결함관리',migration:'이관항목',links:'운영링크'};
  document.getElementById('topbar-title').textContent = titles[page];
  ({home:renderHome,schedule:renderSchedule,impact:renderImpact,defect:renderDefect,migration:renderMigration,links:renderLinks})[page]();
}

// ══ 홈 ══════════════════════════════════════════════
async function renderHome() {
  setActions('');
  setContent('<div class="loading">⏳ 데이터 로딩 중...</div>');
  await Promise.all([
    SheetsAPI.getSchedules().then(d=>S.schedules=d).catch(()=>{}),
    SheetsAPI.getDefects().then(d=>S.defects=d).catch(()=>{}),
    SheetsAPI.getPages().then(d=>S.pages=d).catch(()=>{}),
    SheetsAPI.getMigrations().then(d=>S.migrations=d).catch(()=>{}),
  ]);

  const todayStr = today();
  const todaySch = S.schedules.filter(s => s['시작일'] <= todayStr && (s['마감일']||todayStr) >= todayStr);
  const criticalDef = S.defects.filter(d => d['심각도']==='긴급' || d['심각도']==='높음');
  const pendingMig = S.migrations.filter(m => m['준비상태']!=='완료');
  const doneSch = S.schedules.filter(s => s['상태']==='완료').length;

  setContent(`
    <div class="grid-4" style="margin-bottom:16px">
      <div class="stat-card">
        <div class="stat-label">📅 오늘 일정</div>
        <div class="stat-value">${todaySch.length}</div>
        <div class="stat-sub">이번 주 완료 ${doneSch}건</div>
        <span class="stat-link" onclick="showPage('schedule')">전체보기 →</span>
      </div>
      <div class="stat-card">

  setContent(`
    <div class="card" style="margin-bottom:0">

          const alerts = [];
          if(defPageIds.has(pid)) alerts.push('<span class="alert-icon" title="미해결 결함 존재">🔴</span>');
          if(schedPageIds.has(pid)) alerts.push('<span class="alert-icon" title="진행중 작업 있음">⚠️</span>');
          const thumb = p['스크린샷URL'] ? `<a href="${p['스크린샷URL']}" target="_blank"><img src="${p['스크린샷URL']}" style="width:40px;height:28px;object-fit:cover;border-radius:3px;border:1px solid var(--border)" onerror="this.style.display='none'"></a>` : '<span style="color:var(--muted);font-size:11px">-</span>';
          return `<tr>
            <td style="color:var(--muted);font-size:11px">${pid}</td>
            <td>${thumb}</td>
            <td><span class="badge badge-blue">${p['사이트']||''}</span></td>

            <td>${p['담당자']||''}</td>

            <td>${alerts.join(' ')||'-'}</td>
            <td>${p['URL']?`<a href="${p['URL']}" target="_blank" style="color:var(--primary);font-size:11px">링크</a>`:''}</td>

function setContent(html) { document.getElementById('content').innerHTML = html; }
function setActions(html) { document.getElementById('topbar-actions').innerHTML = html; }

// ══ GitHub Token 설정 ════════════════════════════════
function checkToken() {
  if (!window.PORTAL_CONFIG.GITHUB_TOKEN) {
    const t = prompt('쓰기 기능을 위해 GitHub PAT를 입력하세요.\n(읽기만 사용한다면 취소)');
    if(t) { localStorage.setItem('portal_gh_token',t); window.PORTAL_CONFIG.GITHUB_TOKEN=t; toast('✅ 토큰 저장됨'); }
  }
}

// ══ 초기화 ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const d = new Date();
  document.getElementById('sidebar-footer').textContent =
    d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  checkToken();
  showPage('home');
});
</script>
