<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운영협업포털</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

  :root {
    /* 신한이지 브랜드 컬러 */
    --primary:        #0046FF;
    --primary-dark:   #003ACC;
    --primary-light:  #EEF3FF;
    --accent:         #00B2FF;

    /* 레이아웃 배경 */
    --bg:             #F3F6FD;
    --card:           #FFFFFF;
    --border:         #DDE3F0;

    /* 텍스트 */
    --text:           #1A2340;
    --muted:          #6B7A99;

    /* 시맨틱 */
    --success:        #00B87C;
    --warning:        #F59E0B;
    --danger:         #E53935;

    --sidebar-w:      220px;
    --radius:         12px;
    --shadow:         0 2px 12px rgba(0,70,255,.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    font-size: 13px;
  }

  /* ══ 사이드바 ══ */
  #sidebar {
    width: var(--sidebar-w);
    background: #0D1B3E;
    color: #f8fafc;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    z-index: 100;
  }

  .logo {
    padding: 22px 20px 18px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    line-height: 1.4;
  }
  .logo-title {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -.3px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .logo-title::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .logo span {
    display: block;
    font-size: 10px;
    font-weight: 400;
    color: rgba(255,255,255,.38);
    margin-top: 4px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  #sidebar nav { flex: 1; padding: 10px 0; }

  #sidebar nav a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    color: rgba(255,255,255,.55);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, color .15s;
    user-select: none;
    border-radius: 0;
    margin: 1px 8px;
    border-radius: 8px;
  }
  #sidebar nav a:hover {
    background: rgba(255,255,255,.08);
    color: #fff;
  }
  #sidebar nav a.active {
    background: var(--primary);
    color: #fff;
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(0,70,255,.35);
  }
  .nav-icon { font-size: 15px; width: 18px; text-align: center; }

  .sidebar-footer {
    padding: 12px 20px;
    font-size: 11px;
    color: rgba(255,255,255,.25);
    border-top: 1px solid rgba(255,255,255,.07);
  }

  /* ══ 메인 ══ */
  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  #topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 1px 0 var(--border);
  }
  .page-title {
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -.3px;
  }

  #content { padding: 24px; flex: 1; }

  /* ══ 카드 ══ */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: .07em;
  }

  /* ══ 버튼 ══ */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: background .15s, box-shadow .15s, transform .1s;
    font-family: inherit;
    letter-spacing: -.1px;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 3px 10px rgba(0,70,255,.25);
  }
  .btn-primary:hover {
    background: var(--primary-dark);
    box-shadow: 0 4px 14px rgba(0,70,255,.35);
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { background: var(--bg); border-color: var(--primary); color: var(--primary); }
  .btn-ghost { background: transparent; border: none; color: var(--muted); padding: 4px 8px; }
  .btn-ghost:hover { color: var(--text); background: var(--bg); }

  /* ══ 배지 ══ */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
    letter-spacing: -.1px;
  }
  .badge-blue   { background: #E8EEFF; color: #0046FF; }
  .badge-green  { background: #E6FAF4; color: #00875A; }
  .badge-red    { background: #FDECEA; color: #C62828; }
  .badge-yellow { background: #FFF8E1; color: #F59E0B; }
  .badge-orange { background: #FFF3E0; color: #E65100; }
  .badge-gray   { background: #F0F2F8; color: #5A6882; }
  .badge-purple { background: #F3EEFF; color: #6C3FF5; }

  /* ══ 테이블 ══ */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    background: #F7F9FE;
    text-align: left;
    padding: 9px 12px;
    font-size: 11px;
    color: var(--muted);
    border-bottom: 1.5px solid var(--border);
    font-weight: 800;
    white-space: nowrap;
    letter-spacing: .03em;
    text-transform: uppercase;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid #EEF1F8;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #F7F9FE; }
  .empty-row td { text-align: center; color: var(--muted); padding: 40px; font-size: 13px; }

  /* ══ 그리드 ══ */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

  /* ══ 통계 카드 ══ */
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px 16px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .stat-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .stat-value {
    font-size: 30px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -1px;
    color: var(--text);
  }
  .stat-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .stat-link {
    font-size: 11px;
    color: var(--primary);
    cursor: pointer;
    margin-top: 8px;
    display: inline-block;
    font-weight: 600;
  }
  .stat-link:hover { text-decoration: underline; }

  /* ══ 필터바 ══ */
  .filter-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-bar input,
  .filter-bar select {
    padding: 7px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    font-family: inherit;
    background: #fff;
    color: var(--text);
    transition: border-color .15s, box-shadow .15s;
    font-weight: 500;
  }
  .filter-bar input:focus,
  .filter-bar select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0,70,255,.1);
  }
  .filter-bar input { min-width: 210px; }
  .filter-count { font-size: 12px; color: var(--muted); margin-left: auto; font-weight: 600; }

  /* ══ 폼 ══ */
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .form-group label .req { color: var(--danger); }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    background: #fff;
    color: var(--text);
    transition: border-color .15s, box-shadow .15s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0,70,255,.1);
  }
  .form-group input.auto-id { background: #F7F9FE; color: var(--muted); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .warn-field { border-color: var(--warning) !important; background: #FFFDF0 !important; }

  /* ══ 모달 ══ */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,27,62,.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    width: 560px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.18);
    border: 1px solid rgba(0,70,255,.08);
  }
  .modal-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { font-size: 15px; font-weight: 800; letter-spacing: -.3px; }
  .modal-body { padding: 20px 22px; }
  .modal-footer {
    padding: 14px 22px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    background: #FAFBFF;
    border-radius: 0 0 16px 16px;
  }
  .close-btn {
    background: #F0F2F8;
    border: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    color: var(--muted);
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .close-btn:hover { background: var(--border); color: var(--text); }

  /* ══ 링크 카드 ══ */
  .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 10px; }
  .link-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    text-decoration: none;
    color: var(--text);
    transition: box-shadow .15s, border-color .15s, transform .15s;
  }
  .link-card:hover {
    box-shadow: 0 4px 16px rgba(0,70,255,.12);
    border-color: var(--primary);
    transform: translateY(-1px);
  }
  .link-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
  .link-name { font-size: 13px; font-weight: 700; }
  .link-desc { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .link-url {
    font-size: 10px;
    color: #A0AABE;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 190px;
    margin-top: 4px;
  }

  /* ══ 토스트 ══ */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #0D1B3E;
    color: #fff;
    padding: 11px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    transform: translateY(8px);
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
    border-left: 3px solid var(--accent);
  }
  #toast.show { opacity: 1; pointer-events: auto; transform: translateY(0); }

  /* ══ 로딩 ══ */
  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 13px; font-weight: 500; }

  .alert-icon { font-size: 13px; }

  /* 사이드바 캐릭터 */
  .sidebar-char {
    padding: 0 0 4px;
    display: flex;
    justify-content: center;
    pointer-events: none;
  }
  .sidebar-char-img {
    width: 90px;
    height: auto;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.25));
    transition: transform .3s ease;
  }
  .sidebar-char-img:hover {
    transform: translateY(-4px) scale(1.05);
  }

  /* 홈 쏠 플로팅 장식 */
  .sol-float {
    position: fixed;
    right: 24px;
    bottom: 60px;
    width: 72px;
    pointer-events: none;
    z-index: 10;
    filter: drop-shadow(0 4px 16px rgba(0,70,255,.15));
    animation: solBob 3s ease-in-out infinite;
  }
  @keyframes solBob {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

</style>
</head>
<body>

<!-- 사이드바 -->
<div id="sidebar">
  <div class="logo"><div class="logo-title">운영협업포털</div><span>Ops Collab Portal</span></div>
<div class="sidebar-char"><img src="https://www.shinhangroup.com/resources/publish/kr/images/about/character_sol.png" alt="쏠" class="sidebar-char-img"></div>
  <nav>
    <a id="nav-home"      onclick="showPage('home')">      <span class="nav-icon">🏠</span> 홈</a>
    <a id="nav-schedule"  onclick="showPage('schedule')">  <span class="nav-icon">📅</span> 일정관리</a>
    <a id="nav-impact"    onclick="showPage('impact')">    <span class="nav-icon">🖥️</span> 영향도관리</a>
    <a id="nav-defect"    onclick="showPage('defect')">    <span class="nav-icon">🐛</span> 결함관리</a>
    <a id="nav-migration" onclick="showPage('migration')"> <span class="nav-icon">🔄</span> 이관항목</a>
    <a id="nav-links"     onclick="showPage('links')">     <span class="nav-icon">🔗</span> 운영링크</a>
  </nav>
  <div class="sidebar-footer" id="sidebar-footer"></div>
</div>

<!-- 메인 -->
<div id="main">
  <div id="topbar">
    <span class="page-title" id="topbar-title">홈</span>
    <div id="topbar-actions" style="display:flex;gap:8px;align-items:center"></div>
  </div>
  <div id="content"></div>
</div>

<!-- 모달: 일정 등록 -->
<div class="modal-bg" id="modal-schedule">
  <div class="modal">
    <div class="modal-header"><h3>📅 일정 등록</h3><button class="close-btn" onclick="closeModal('modal-schedule')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>일정ID</label><input type="text" id="sch-id" class="auto-id" readonly></div>
        <div class="form-group"><label>담당자 <span class="req">*</span></label><input type="text" id="sch-owner" placeholder="홍길동"></div>
      </div>
      <div class="form-group"><label>제목 <span class="req">*</span></label><input type="text" id="sch-title" placeholder="일정 제목"></div>
      <div class="form-row">
        <div class="form-group">
          <label>업무유형 <span class="req">*</span></label>
          <select id="sch-type"><option>배포</option><option>점검</option><option>이벤트</option><option>긴급대응</option><option>기타</option></select>
        </div>
        <div class="form-group">
          <label>상태</label>
          <select id="sch-status"><option>예정</option><option>진행중</option><option>완료</option><option>취소</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>시작일 <span class="req">*</span></label><input type="date" id="sch-start"></div>
        <div class="form-group"><label>마감일 <span class="req">*</span></label><input type="date" id="sch-end"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>관련페이지ID</label><input type="text" id="sch-page" placeholder="PG-0001 (쉼표 구분)"></div>
        <div class="form-group"><label>관련결함ID</label><input type="text" id="sch-defect" placeholder="DEF-0001 (쉼표 구분)"></div>
      </div>
      <div class="form-group"><label>메모</label><textarea id="sch-memo" rows="2" placeholder="추가 메모"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-schedule')">취소</button>
      <button class="btn btn-primary" onclick="submitSchedule()">등록</button>
    </div>
  </div>
</div>

<!-- 모달: 결함 등록 -->
<div class="modal-bg" id="modal-defect">
  <div class="modal">
    <div class="modal-header"><h3>🐛 결함 등록</h3><button class="close-btn" onclick="closeModal('modal-defect')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>결함ID</label><input type="text" id="def-id" class="auto-id" readonly></div>
        <div class="form-group"><label>담당자 <span class="req">*</span></label><input type="text" id="def-owner" placeholder="홍길동"></div>
      </div>
      <div class="form-group"><label>제목 <span class="req">*</span></label><input type="text" id="def-title" placeholder="결함 제목"></div>
      <div class="form-row">
        <div class="form-group">
          <label>카테고리 <span class="req">*</span></label>
          <select id="def-category"><option>UI/UX</option><option>기능오류</option><option>성능</option><option>보안</option><option>데이터</option><option>기타</option></select>
        </div>
        <div class="form-group">
          <label>심각도 <span class="req">*</span></label>
          <select id="def-severity" onchange="checkSeverity()"><option>긴급</option><option>높음</option><option>중간</option><option>낮음</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>상태</label>
          <select id="def-status" onchange="checkDefectStatus()"><option>미처리</option><option>처리중</option><option>해결</option><option>보류</option></select>
        </div>
        <div class="form-group"><label>관련페이지ID</label><input type="text" id="def-page" placeholder="PG-0001"></div>
      </div>
      <div class="form-group"><label>증상 <span class="req">*</span></label><textarea id="def-symptom" rows="2" placeholder="발생 증상 설명"></textarea></div>
      <div class="form-group"><label>원인</label><input type="text" id="def-cause" placeholder="원인 분석"></div>
      <div class="form-group"><label>해결방법</label><textarea id="def-solution" rows="2" placeholder="해결 방법"></textarea></div>
      <div class="form-group" id="def-prevent-group">
        <label>재발방지 <span id="def-prevent-req" style="display:none" class="req">* 해결 상태에서는 필수</span></label>
        <input type="text" id="def-prevent" placeholder="재발 방지 대책">
      </div>
      <div class="form-group"><label>등록일</label><input type="date" id="def-date"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-defect')">취소</button>
      <button class="btn btn-primary" onclick="submitDefect()">등록</button>
    </div>

<script>
// ══ 설정 ════════════════════════════════════════════
window.PORTAL_CONFIG = {
  SPREADSHEET_ID: '12ZpwaDPNCV1V48xUtuWv2cooGtAjBZLIbClu3R88HoU',
  GITHUB_OWNER:   'nvidiabigfan',

  GITHUB_TOKEN:   localStorage.getItem('portal_gh_token') || '',
};

// ══ 상태 ════════════════════════════════════════════
const S = { schedules:[], pages:[], defects:[], links:[], migrations:[] };

// ══ 유틸 ════════════════════════════════════════════
let _toastTimer;
function toast(msg, ms=2800) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function pad4(n) { return String(n).padStart(4,'0'); }
function today() { return new Date().toISOString().slice(0,10); }

function severityBadge(s) {
  const m = {'긴급':'badge-red','높음':'badge-orange','중간':'badge-yellow','낮음':'badge-blue',
             '미처리':'badge-red','처리중':'badge-yellow','해결':'badge-green','보류':'badge-gray',
             '예정':'badge-blue','진행중':'badge-yellow','완료':'badge-green','취소':'badge-gray'};
  return `<span class="badge ${m[s]||'badge-gray'}">${s||''}</span>`;
}

// CSV 내보내기
function exportCSV(data, filename) {
  if (!data.length) { toast('내보낼 데이터가 없습니다'); return; }
  const keys = Object.keys(data[0]);
  const rows = [keys.join(','), ...data.map(r => keys.map(k => `"${(r[k]||'').replace(/"/g,'""')}"`).join(','))];
  const blob = new Blob(['\uFEFF'+rows.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}

// ══ 내비게이션 ════════════════════════════════════════
function showPage(page) {
  document.querySelectorAll('#sidebar nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('nav-'+page).classList.add('active');
  const titles = {home:'홈',schedule:'일정관리',impact:'영향도관리',defect:'결함관리',migration:'이관항목',links:'운영링크'};
  document.getElementById('topbar-title').textContent = titles[page];
  ({home:renderHome,schedule:renderSchedule,impact:()=>renderImpact(),defect:renderDefect,migration:renderMigration,links:renderLinks})[page]();
}

// ══ 홈 ══════════════════════════════════════════════
async function renderHome() {
  setActions('');

  await Promise.all([
    SheetsAPI.getSchedules().then(d=>S.schedules=d).catch(()=>{}),

  const todayStr = today();

  // 미래 이관 건수 (오늘 이후)

  setContent(`

        <div class="stat-sub">이번 주 완료 ${doneSch}건</div>
        <span class="stat-link" onclick="showPage('schedule')">전체보기 →</span>
      </div>
      <div class="stat-card">
        <div class="stat-label">🖥️ 영향 페이지</div>
        <div class="stat-value">${S.pages.length}</div>
        <div class="stat-sub">등록된 화면</div>
        <span class="stat-link" onclick="showPage('impact')">전체보기 →</span>
      </div>
      <div class="stat-card">
        <div class="stat-label">🐛 긴급/높음 결함</div>
        <div class="stat-value" style="color:var(--danger)">${criticalDef.length}</div>
        <div class="stat-sub">전체 ${S.defects.length}건</div>
        <span class="stat-link" onclick="showPage('defect')">전체보기 →</span>
      </div>
      <div class="stat-card">

        <span class="stat-link" onclick="showPage('migration')">전체보기 →</span>
      </div>

      <div class="card">
        <div class="card-title" style="display:flex;align-items:center;justify-content:space-between">

            <select id="home-assignee-filter" onchange="filterHomeTodaySchedule()"
              style="font-size:11px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--text);font-family:inherit">
              ${['전체',...new Set(todaySch.map(s=>s['담당자']).filter(Boolean))].map(a=>`<option value="${a}">${a}</option>`).join('')}
            </select>
          </div>
        </div>
        <div id="home-today-wrap" class="tbl-wrap"></div>
      </div>
      <div class="card">
        <div class="card-title" style="display:flex;align-items:center;justify-content:space-between">
          <span>🔄 이관 예정 현황</span>
          <div style="display:flex;align-items:center;gap:4px">
            <input type="date" id="mig-from" value="${todayStr}"
              onchange="filterMigDashboard()"
              style="font-size:11px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;font-family:inherit">
            <span style="font-size:11px;color:var(--muted)">~</span>
            <input type="date" id="mig-to" value="${new Date(Date.now()+30*864e5).toISOString().slice(0,10)}"
              onchange="filterMigDashboard()"
              style="font-size:11px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;font-family:inherit">
          </div>
        </div>
        <div id="home-mig-wrap" class="tbl-wrap"></div>
      </div>
    </div>`);

  // 초기 렌더
  window._homeTodaySch = todaySch;
  window._homeMigRows  = S.migrations;
  filterHomeTodaySchedule();
  filterMigDashboard();
}

function filterHomeTodaySchedule() {
  const val = (document.getElementById('home-assignee-filter')||{}).value || '전체';
  const rows = val === '전체' ? window._homeTodaySch : (window._homeTodaySch||[]).filter(s => s['담당자'] === val);
  document.getElementById('home-today-wrap').innerHTML = `<table>
    <thead><tr><th>제목</th><th>담당자</th><th>마감일</th><th>상태</th></tr></thead>
    <tbody>${rows.slice(0,6).map(s=>`<tr>
      <td style="font-weight:500">${s['제목']||''}</td>
      <td>${s['담당자']||''}</td>
      <td>${s['마감일']||''}</td>
      <td>${severityBadge(s['상태']||'')}</td>
    </tr>`).join('')||`<tr class="empty-row"><td colspan="4">해당 담당자 일정 없음</td></tr>`}
    </tbody>
  </table>`;
}

function filterMigDashboard() {
  
  const from = (document.getElementById('mig-from')||{}).value || todayStr;
  const to   = (document.getElementById('mig-to')||{}).value   || '';
  const rows = (window._homeMigRows||[]).filter(m => {
    const d = m['이관일'] || '';
    if (!d) return false;
    if (d < from) return false;
    if (to && d > to) return false;
    return true;
  });
  const wrap = document.getElementById('home-mig-wrap');
  if (!wrap) return;
  wrap.innerHTML = rows.length === 0
    ? `<p style="text-align:center;color:var(--muted);padding:28px 0;font-size:13px">해당 기간 이관 예정 없음 ✅</p>`
    : `<table>
        <thead><tr><th>항목명</th><th>담당자</th><th>이관일</th><th>준비상태</th></tr></thead>
        <tbody>${rows.map(m=>`<tr>
          <td style="font-weight:500">${m['항목명']||''}</td>
          <td>${m['담당자']||''}</td>
          <td>${m['이관일']||''}</td>
          <td>${severityBadge(m['준비상태']||'')}</td>
        </tr>`).join('')}
        </tbody>
      </table>`;
}

function renderPgTable() {
  const q = (document.getElementById('pg-q')||{}).value||'';

    (!site || p['사이트']===site));

  // 주의사항 자동 계산
  const defPageIds = new Set(S.defects.filter(d=>d['상태']!=='해결').map(d=>d['관련페이지ID']).filter(Boolean).flatMap(v=>v.split(',')).map(v=>v.trim()));

        <tbody>${pgFiltered.map(p=>{
          const pid = p['페이지ID']||'';

          if(defPageIds.has(pid)) alerts.push('<span class="alert-icon" title="미해결 결함 존재">🔴</span>');
          if(schedPageIds.has(pid)) alerts.push('<span class="alert-icon" title="진행중 작업 있음">⚠️</span>');

            <td>${p['최근변경일']||''}</td>

  setActions(`

function renderDefTable() {
  const q = (document.getElementById('def-q')||{}).value||'';
  const sv = (document.getElementById('def-sv')||{}).value||'';
  const st = (document.getElementById('def-st-f')||{}).value||'';
  defFiltered = S.defects.filter(d =>
    (!q || (d['제목']||'').includes(q)||(d['담당자']||'').includes(q)) &&
    (!sv || d['심각도']===sv) && (!st || d['상태']===st));

  const cnt = (sev) => S.defects.filter(d=>d['심각도']===sev && d['상태']!=='해결').length;
  setContent(`
    <div class="grid-4" style="margin-bottom:14px">
      <div class="stat-card"><div class="stat-label">🔴 긴급</div><div class="stat-value" style="color:var(--danger)">${cnt('긴급')}</div></div>
      <div class="stat-card"><div class="stat-label">🟠 높음</div><div class="stat-value" style="color:#c2410c">${cnt('높음')}</div></div>
      <div class="stat-card"><div class="stat-label">🟡 중간</div><div class="stat-value" style="color:var(--warning)">${cnt('중간')}</div></div>
      <div class="stat-card"><div class="stat-label">✅ 해결</div><div class="stat-value" style="color:var(--success)">${S.defects.filter(d=>d['상태']==='해결').length}</div></div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="filter-bar">
        <input id="def-q" placeholder="🔍 제목, 담당자 검색" oninput="renderDefTable()" value="${(document.getElementById('def-q')||{}).value||''}">
        <select id="def-sv" onchange="renderDefTable()">
          <option value="">전체 심각도</option><option>긴급</option><option>높음</option><option>중간</option><option>낮음</option>
        </select>
        <select id="def-st-f" onchange="renderDefTable()">
          <option value="">전체 상태</option><option>미처리</option><option>처리중</option><option>해결</option><option>보류</option>
        </select>
        <span class="filter-count">${defFiltered.length}건</span>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>결함ID</th><th>제목</th><th>카테고리</th><th>심각도</th><th>상태</th><th>담당자</th><th>등록일</th><th>관련페이지</th></tr></thead>
        <tbody>${defFiltered.map(d=>`<tr>
          <td style="color:var(--muted);font-size:11px">${d['결함ID']||''}</td>
          <td style="font-weight:500">${d['제목']||''}</td>
          <td><span class="badge badge-gray">${d['카테고리']||''}</span></td>
          <td>${severityBadge(d['심각도']||'')}</td>
          <td>${severityBadge(d['상태']||'미처리')}</td>
          <td>${d['담당자']||''}</td>
          <td>${d['등록일']||''}</td>
          <td style="font-size:11px;color:var(--muted)">${d['관련페이지ID']||''}</td>
        </tr>`).join('')||`<tr class="empty-row"><td colspan="8">등록된 결함이 없습니다</td></tr>`}
        </tbody>
      </table></div>
    </div>`);
}

function checkSeverity() {
  const sv = document.getElementById('def-severity').value;

function checkDefectStatus() {
  const st = document.getElementById('def-status').value;
  const req = document.getElementById('def-prevent-req');

}

async function submitSchedule() {
  const title = document.getElementById('sch-title').value.trim();
  const owner = document.getElementById('sch-owner').value.trim();
  if (!title||!owner) { toast('❌ 제목과 담당자는 필수입니다'); return; }
  const row = {
    '일정ID':document.getElementById('sch-id').value,
    '제목':title,'담당자':owner,
    '업무유형':document.getElementById('sch-type').value,
    '상태':document.getElementById('sch-status').value,
    '시작일':document.getElementById('sch-start').value,
    '마감일':document.getElementById('sch-end').value,
    '관련페이지ID':document.getElementById('sch-page').value,
    '관련결함ID':document.getElementById('sch-defect').value,
    '메모':document.getElementById('sch-memo').value,
  };
  toast('⏳ 저장 중...');
  const r = await SheetsAPI.addSchedule(row);
  closeModal('modal-schedule');
  toast(r.ok ? '✅ 일정 등록 완료' : `❌ ${r.message}`);
  if(r.ok) setTimeout(renderSchedule, 800);
}

async function submitDefect() {
  const title = document.getElementById('def-title').value.trim();
  const owner = document.getElementById('def-owner').value.trim();
  const status = document.getElementById('def-status').value;
  const prevent = document.getElementById('def-prevent').value.trim();
  if(!title||!owner) { toast('❌ 제목과 담당자는 필수입니다'); return; }
  if(status==='해결'&&!prevent) { toast('⚠️ 해결 상태에서는 재발방지 항목이 필수입니다'); return; }
  const row = {
    '결함ID':document.getElementById('def-id').value,
    '제목':title,'카테고리':document.getElementById('def-category').value,
    '심각도':document.getElementById('def-severity').value,
    '상태':status,
    '증상':document.getElementById('def-symptom').value,
    '원인':document.getElementById('def-cause').value,
    '해결방법':document.getElementById('def-solution').value,
    '관련페이지ID':document.getElementById('def-page').value,
    '재발방지':prevent,'담당자':owner,
    '등록일':document.getElementById('def-date').value,

  toast('⏳ 저장 중...');

  if(r.ok) setTimeout(renderDefect, 800);
}

function checkToken() {
  if (!window.PORTAL_CONFIG.GITHUB_TOKEN) {
    const t = prompt('쓰기 기능을 위해 GitHub PAT를 입력하세요.\n(읽기만 사용한다면 취소)');
    if(t) { localStorage.setItem('portal_gh_token',t); window.PORTAL_CONFIG.GITHUB_TOKEN=t; toast('✅ 토큰 저장됨'); }
  }
}
