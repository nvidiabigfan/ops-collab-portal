name: Sheets Write

on:
  workflow_dispatch:
    inputs:
      sheet_name:
        description: '대상 시트명'
        required: true
        type: string
      row_json:
        description: '행 데이터 (JSON)'
        required: false
        type: string
        default: '{}'
      action:
        description: 'append | update | delete'
        required: false
        type: string
        default: 'append'
      row_id_key:
        description: 'update/delete 시 ID 컬럼명 (예: 일정ID)'
        required: false
        type: string
        default: ''
      row_id_val:
        description: 'update/delete 시 ID 값 (예: SCH-0001)'
        required: false
        type: string
        default: ''

jobs:
  sheets-write:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install gspread google-auth
      - env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ inputs.sheet_name }}
          ROW_JSON: ${{ inputs.row_json }}
          ACTION: ${{ inputs.action }}
          ROW_ID_KEY: ${{ inputs.row_id_key }}
          ROW_ID_VAL: ${{ inputs.row_id_val }}
        run: python scripts/append_row.py
